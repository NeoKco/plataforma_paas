name: Backend Deploy

concurrency:
  group: backend-deploy-${{ inputs.environment || github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
      collect_evidence:
        description: "Recolectar evidencia operativa post-deploy"
        required: true
        default: true
        type: boolean
      run_remote_smoke:
        description: "Ejecutar smoke funcional remoto tras el deploy"
        required: true
        default: true
        type: boolean
      remote_smoke_target:
        description: "Subset remoto a validar"
        required: true
        default: all
        type: choice
        options:
          - all
          - base
          - platform
          - tenant

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Register deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PROJECT_ROOT: ${{ secrets.DEPLOY_PROJECT_ROOT }}
          TARGET_ENV: ${{ inputs.environment }}
          TARGET_REF: ${{ inputs.git_ref }}
          COLLECT_EVIDENCE: ${{ inputs.collect_evidence }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PROJECT_ROOT}"
          git fetch --all --tags --prune
          git checkout "${TARGET_REF}"
          export COLLECT_OPERATIONAL_EVIDENCE="${COLLECT_EVIDENCE}"

          if [ "${TARGET_ENV}" = "staging" ]; then
            bash deploy/deploy_backend_staging.sh
          else
            bash deploy/deploy_backend_production.sh
          fi
          EOF

      - name: Run remote functional smoke
        if: ${{ inputs.run_remote_smoke }}
        env:
          SMOKE_BASE_URL: ${{ secrets.BACKEND_PUBLIC_BASE_URL }}
          SMOKE_TARGET: ${{ inputs.remote_smoke_target }}
          SMOKE_PLATFORM_EMAIL: ${{ secrets.SMOKE_PLATFORM_EMAIL }}
          SMOKE_PLATFORM_PASSWORD: ${{ secrets.SMOKE_PLATFORM_PASSWORD }}
          SMOKE_TENANT_SLUG: ${{ secrets.SMOKE_TENANT_SLUG }}
          SMOKE_TENANT_EMAIL: ${{ secrets.SMOKE_TENANT_EMAIL }}
          SMOKE_TENANT_PASSWORD: ${{ secrets.SMOKE_TENANT_PASSWORD }}
          SMOKE_TIMEOUT_SECONDS: "20"
          SMOKE_ATTEMPTS: "4"
          SMOKE_RETRY_DELAY_SECONDS: "5"
          SMOKE_REPORT_PATH: /tmp/backend-deploy-smoke/remote-backend-smoke-report.json
        run: |
          mkdir -p /tmp/backend-deploy-smoke
          python deploy/run_remote_backend_smoke.py | tee /tmp/backend-deploy-smoke/remote-backend-smoke.log

      - name: Resolve remote operational evidence
        id: resolve_evidence
        if: always()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PROJECT_ROOT: ${{ secrets.DEPLOY_PROJECT_ROOT }}
        run: |
          REMOTE_EVIDENCE_PATH=$(ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "ls -1t '${DEPLOY_PROJECT_ROOT}/operational_evidence'/backend_operational_evidence_*.log 2>/dev/null | head -n 1" || true)
          echo "remote_evidence_path=${REMOTE_EVIDENCE_PATH}" >> "$GITHUB_OUTPUT"
          if [ -n "$REMOTE_EVIDENCE_PATH" ]; then
            echo "Remote evidence: $REMOTE_EVIDENCE_PATH"
          else
            echo "No remote operational evidence file found."
          fi

      - name: Download operational evidence
        if: always() && steps.resolve_evidence.outputs.remote_evidence_path != ''
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p /tmp/backend-deploy-evidence
          scp "${DEPLOY_USER}@${DEPLOY_HOST}:${{ steps.resolve_evidence.outputs.remote_evidence_path }}" /tmp/backend-deploy-evidence/

      - name: Publish deploy summary
        if: always()
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_REF: ${{ inputs.git_ref }}
          REMOTE_SMOKE_ENABLED: ${{ inputs.run_remote_smoke }}
          REMOTE_SMOKE_TARGET: ${{ inputs.remote_smoke_target }}
          REMOTE_EVIDENCE_PATH: ${{ steps.resolve_evidence.outputs.remote_evidence_path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("/tmp/backend-deploy-smoke/remote-backend-smoke-report.json")
          log_path = Path("/tmp/backend-deploy-smoke/remote-backend-smoke.log")

          environment = os.environ.get("DEPLOY_ENVIRONMENT", "unknown")
          deploy_ref = os.environ.get("DEPLOY_REF", "unknown")
          smoke_enabled = os.environ.get("REMOTE_SMOKE_ENABLED", "false") == "true"
          smoke_target = os.environ.get("REMOTE_SMOKE_TARGET", "all")
          evidence_path = os.environ.get("REMOTE_EVIDENCE_PATH", "")

          lines = [
            "# Backend deploy summary",
            "",
            f"- Environment: `{environment}`",
            f"- Git ref: `{deploy_ref}`",
            f"- Remote smoke enabled: `{str(smoke_enabled).lower()}`",
            f"- Remote smoke target: `{smoke_target}`",
          ]

          if evidence_path:
            lines.append(f"- Remote evidence path: `{evidence_path}`")
          else:
            lines.append("- Remote evidence path: not found")

          if smoke_enabled and report_path.exists():
            payload = json.loads(report_path.read_text())
            lines.extend(
              [
                "",
                "## Remote smoke result",
                "",
                f"- Status: `{payload.get('status', 'unknown')}`",
                f"- Base URL: `{payload.get('base_url', '')}`",
                f"- Attempts: `{payload.get('attempts', '')}`",
                f"- Retry delay: `{payload.get('retry_delay', '')}`",
                f"- Platform block: `{str(payload.get('run_platform', False)).lower()}`",
                f"- Tenant block: `{str(payload.get('run_tenant', False)).lower()}`",
              ]
            )
            error = payload.get("error")
            if error:
              lines.extend(["", "### Smoke error", "", "```text", error[:4000], "```"])
          elif smoke_enabled:
            lines.extend(["", "## Remote smoke result", "", "No JSON report was generated."])
          else:
            lines.extend(["", "## Remote smoke result", "", "Skipped by workflow input."])

          if log_path.exists():
            log_lines = log_path.read_text().splitlines()
            tail = "\n".join(log_lines[-40:])
            if tail:
              lines.extend(["", "## Smoke log tail", "", "```text", tail[:4000], "```"])

          summary_path.write_text("\n".join(lines) + "\n")
          PY

      - name: Upload operational evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-operational-evidence-${{ inputs.environment }}
          path: /tmp/backend-deploy-evidence
          if-no-files-found: ignore

      - name: Upload remote smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-remote-smoke-${{ inputs.environment }}
          path: /tmp/backend-deploy-smoke
          if-no-files-found: ignore
