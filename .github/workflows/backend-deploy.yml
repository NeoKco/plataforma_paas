name: Backend Deploy

concurrency:
  group: backend-deploy-${{ inputs.environment || github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
      collect_evidence:
        description: "Recolectar evidencia operativa post-deploy"
        required: true
        default: true
        type: boolean
      run_remote_smoke:
        description: "Ejecutar smoke funcional remoto tras el deploy"
        required: true
        default: true
        type: boolean
      remote_smoke_target:
        description: "Subset remoto a validar"
        required: true
        default: all
        type: choice
        options:
          - all
          - base
          - platform
          - tenant

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Register deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PROJECT_ROOT: ${{ secrets.DEPLOY_PROJECT_ROOT }}
          TARGET_ENV: ${{ inputs.environment }}
          TARGET_REF: ${{ inputs.git_ref }}
          COLLECT_EVIDENCE: ${{ inputs.collect_evidence }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PROJECT_ROOT}"
          git fetch --all --tags --prune
          git checkout "${TARGET_REF}"
          export COLLECT_OPERATIONAL_EVIDENCE="${COLLECT_EVIDENCE}"

          if [ "${TARGET_ENV}" = "staging" ]; then
            bash deploy/deploy_backend_staging.sh
          else
            bash deploy/deploy_backend_production.sh
          fi
          EOF

      - name: Run remote functional smoke
        if: ${{ inputs.run_remote_smoke }}
        env:
          SMOKE_BASE_URL: ${{ secrets.BACKEND_PUBLIC_BASE_URL }}
          SMOKE_TARGET: ${{ inputs.remote_smoke_target }}
          SMOKE_PLATFORM_EMAIL: ${{ secrets.SMOKE_PLATFORM_EMAIL }}
          SMOKE_PLATFORM_PASSWORD: ${{ secrets.SMOKE_PLATFORM_PASSWORD }}
          SMOKE_TENANT_SLUG: ${{ secrets.SMOKE_TENANT_SLUG }}
          SMOKE_TENANT_EMAIL: ${{ secrets.SMOKE_TENANT_EMAIL }}
          SMOKE_TENANT_PASSWORD: ${{ secrets.SMOKE_TENANT_PASSWORD }}
          SMOKE_TIMEOUT_SECONDS: "20"
          SMOKE_ATTEMPTS: "4"
          SMOKE_RETRY_DELAY_SECONDS: "5"
        run: |
          mkdir -p /tmp/backend-deploy-smoke
          python deploy/run_remote_backend_smoke.py | tee /tmp/backend-deploy-smoke/remote-backend-smoke.log

      - name: Resolve remote operational evidence
        id: resolve_evidence
        if: always()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PROJECT_ROOT: ${{ secrets.DEPLOY_PROJECT_ROOT }}
        run: |
          REMOTE_EVIDENCE_PATH=$(ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "ls -1t '${DEPLOY_PROJECT_ROOT}/operational_evidence'/backend_operational_evidence_*.log 2>/dev/null | head -n 1" || true)
          echo "remote_evidence_path=${REMOTE_EVIDENCE_PATH}" >> "$GITHUB_OUTPUT"
          if [ -n "$REMOTE_EVIDENCE_PATH" ]; then
            echo "Remote evidence: $REMOTE_EVIDENCE_PATH"
          else
            echo "No remote operational evidence file found."
          fi

      - name: Download operational evidence
        if: always() && steps.resolve_evidence.outputs.remote_evidence_path != ''
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p /tmp/backend-deploy-evidence
          scp "${DEPLOY_USER}@${DEPLOY_HOST}:${{ steps.resolve_evidence.outputs.remote_evidence_path }}" /tmp/backend-deploy-evidence/

      - name: Upload operational evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-operational-evidence-${{ inputs.environment }}
          path: /tmp/backend-deploy-evidence
          if-no-files-found: ignore

      - name: Upload remote smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-remote-smoke-${{ inputs.environment }}
          path: /tmp/backend-deploy-smoke
          if-no-files-found: ignore
