name: Backend Tests

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "backend/**"
      - "scripts/dev/run_local_backend_baseline.sh"
      - ".github/workflows/backend-tests.yml"
      - "infra/env/pgtest.example.env"
      - "docs/runbooks/backend-tests.md"
      - "docs/runbooks/backend-ci.md"
      - "README.md"
  pull_request:
    paths:
      - "backend/**"
      - "scripts/dev/run_local_backend_baseline.sh"
      - ".github/workflows/backend-tests.yml"
      - "infra/env/pgtest.example.env"
      - "docs/runbooks/backend-tests.md"
      - "docs/runbooks/backend-ci.md"
      - "README.md"
  workflow_dispatch:
    inputs:
      target:
        description: "Subset backend a ejecutar"
        required: true
        default: all
        type: choice
        options:
          - all
          - auth
          - tenant
          - finance
          - provisioning
          - platform

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "true"
      PGTEST_HOST: 127.0.0.1
      PGTEST_PORT: "5432"
      PGTEST_ADMIN_DB: postgres
      PGTEST_ADMIN_USER: postgres
      PGTEST_ADMIN_PASSWORD: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/base.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          last_error = None

          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=2):
                      print("PostgreSQL is ready.")
                      raise SystemExit(0)
              except OSError as exc:
                  last_error = exc
                  time.sleep(1)

          raise SystemExit(f"PostgreSQL did not become ready in time: {last_error}")
          PY

      - name: Run backend test runner
        working-directory: backend
        run: |
          TARGET="all"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          fi
          python app/scripts/run_backend_tests.py --target "$TARGET"
